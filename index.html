    <!-- Structured Data: Organization -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "CTS Institute™",
      "alternateName": "Operational Intelligence Institute",
      "description": "The CTS Institute™ is the operational intelligence membership community for CTOs, COOs, and strategic operations leaders. Developed by Razzell Valentine under Nexum Suum.",

      "logo": "https://institute.nexumsuum.com/favicon.svg",
      "founder": {
        "@type": "Person",
        "name": "Razzell Valentine",
        "url": "https://nexumsuum.com"
      },
      "parentOrganization": {
        "@type": "Organization",
        "name": "Nexum Suum",
        "url": "https://nexumsuum.com"
      },
      "sameAs": [
        "https://nexumsuum.com"
      ],

        "@type": "Offer",
        "category": "Professional Membership",
        "description": "Explorer, Professional, Practitioner, and Founding Member tiers offering operational intelligence certifications, roundtables, and research access."
      }
    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "CTS Institute™ — Nexum Suum",
      "url": "https://institute.nexumsuum.com",

        "@type": "Organization",
        "name": "Nexum Suum",

      }

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Netlify Forms detection stubs (hidden, required for bot discovery) -->
    <form name="contact" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" /><input name="email" /><input name="topic" /><textarea name="message"></textarea>
    </form>
    <form name="events-notify" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="events-notify" />
      <input name="email" />
    </form>
    <form name="download-request" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="download-request" />
      <input name="email" /><input name="download" />
    </form>
    <form name="pulse-subscribe" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="pulse-subscribe" />
      <input name="email" />
    </form>
    <form name="journal-subscribe" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="journal-subscribe" />
      <input name="email" />
    </form>
